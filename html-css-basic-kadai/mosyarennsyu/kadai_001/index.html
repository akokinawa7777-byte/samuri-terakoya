<!DOCTYPE html>
<html>
<head>
  <title>MyProfile</title>
  <meta charset="UTF-8">
  <meta name="description" content="">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="tittle">My Profile</h1>

    <nav id="nav-pc">
      <a href="index.html#ABOUT">About</a>
      <a href="index.html#WORKS">Works</a>
    </nav>
  </header>

  <main>
    <section id="main-visual">
      <img src="images/main.png" ait="カメラの写真">
    </section>

    <h2 class="index-h2">About</h2>

    <section id="ABOUT">
      <div id="picture">
        <div>
          <img id="picture-photo" src="images/about.png" alt="本人の写真">

        </div>
      </div>

        <div id="Profile">
          <div class="name">Kazuki Asahina</div>
          <p>25歳　長野県佐久市出身</p>
          <p>ソフトウェア業界でマーケティングに従事</p>
          <p>趣味はカメラ、愛機はCanon</p>
          <p>自然を撮影するのが好きで、海や山によく行く</p>
        </div>

    </section>

    <h3 class="index-h2">Works</h3>

    <section id="WORKS">
      <div class="view-pictures">
        <div>
          <img id="view-picture" src="images/works1.png" alt="海の写真">
          <p>新潟に訪れた際に、日本海の雄大さに魅了されて撮影した１枚</p>
        </div>

        <div>
          <img id="view-picture" src="images/works2.png" alt="山の写真">
          <p>地元長野の木曽町から撮影した冠雪した御嶽山</p>
        </div>

        <div>
          <img id="view-picture" src="images/works3.png" alt="町の写真">
          <p>京都で撮影した、明け方の古き良き日本の街並み</p>
        </div>
      </div>
    </section>

    <footer>
      <span id="copyspan">© MyProfile. All rights reserved.</span>
    </footer>
  </main>

</body>
</html>
